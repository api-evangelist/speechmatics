apis:
  - aid: speechmatics:batch-transcription-api
    name: Speechmatics Batch Transcription API
    description: REST API for submitting audio files for asynchronous batch transcription, managing jobs, and retrieving transcripts with support for 55+ languages, diarization, translation, and custom vocabulary.
