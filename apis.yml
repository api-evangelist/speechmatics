description: >
  Speechmatics is an enterprise-grade speech intelligence platform headquartered in
  Cambridge, UK, offering highly accurate speech-to-text APIs supporting 55+ languages
  with batch and real-time transcription modes. The platform provides REST APIs for
  batch transcription job management and WebSocket APIs for low-latency real-time
  streaming transcription, along with speaker diarization, speaker identification,
  custom vocabulary, sentiment analysis, translation, and topic detection. Speechmatics
  also offers a Text-to-Speech API, a Voice Agent API (early access), and a Management
  API for programmatic account and API key management. Deployments are available as
  cloud SaaS, containerized on-premises, Kubernetes, and virtual appliance options.
